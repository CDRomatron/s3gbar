<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spyro: Attack of the Rhynocs - Randomizer</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #121212;
      color: #eee;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    h1 {
      margin-top: 0;
      color: #ffd166;
    }

    button {
      background: #06d6a0;
      border: none;
      color: #111;
      padding: 8px 14px;
      margin-right: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #05b488;
    }

    .controls {
      margin-bottom: 15px;
      padding: 10px;
      background: #1e1e1e;
      border-radius: 6px;
      border: 1px solid #444;
    }

    .controls label {
      margin-right: 10px;
    }

    .controls input {
      width: 50px;
      margin-right: 20px;
      padding: 2px 4px;
      border-radius: 4px;
      border: 1px solid #555;
      background: #111;
      color: #eee;
    }

    .output-panel {
      margin-top: 20px;
      padding: 15px;
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 6px;
    }

    .output-panel h2 {
      margin-top: 0;
      color: #ffd166;
    }

    .output-box {
      background: #111;
      color: #eee;
      padding: 10px;
      border-radius: 4px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      font-size: 14px;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      color: #bbb;
    }
  </style>
</head>

<body>
  <h1>Spyro Randomizer</h1>

  <div class="controls">
	<label for="optCustomSeed">Seed:</label>
	<input id="optCustomSeed" type="text" placeholder="(blank = random)" style="width:120px;" />

    <label for="optLength">Length(1-Short 2-Medium, 3-Long, 0-Any):</label>
    <input id="optLength" type="number" min="0" max="3" value="0" />
  </div>

  <div>
    <button onclick="generateSeed()">Generate Seed</button>
    <button onclick="toggleSpoiler()">Toggle Spoiler Log</button>
    <button onclick="toggleWotD()">Toggle Way of the Dragon</button>
	<label for="romUpload">Upload GBA ROM:</label>
  <input id="romUpload" type="file" accept=".gba" />
<button onclick="patchRom()">Patch ROM</button>

  </div>
  
  <div id="patchStatus"></div>


  <div id="status"></div>

  <!-- SPOILER LOG PANEL -->
  <div id="spoilerLogContainer" class="output-panel" style="display:none;">
    <h2>Spoiler Log</h2>
    <pre id="spoilerLogOutput" class="output-box"></pre>
  </div>

  <!-- WAY OF THE DRAGON PANEL -->
  <div id="wayOfTheDragonContainer" class="output-panel" style="display:none;">
    <h2>Way of the Dragon</h2>
    <pre id="wayOfTheDragonOutput" class="output-box"></pre>
  </div>

  <!-- LOAD YOUR FILES -->
	<script src="itemIdMap.js"></script>
	<script src="randomizerTable.js"></script>
	<script src="logic.js"></script>
	<script src="randomizer-original.js"></script>
	<script src="patcher.js"></script>




  <script>
	  function seededRNG(seed) {
	  let s = 0;
	  for (let i = 0; i < seed.length; i++) {
		s = (s * 31 + seed.charCodeAt(i)) >>> 0;
	  }
	  return function() {
		s = (s * 1664525 + 1013904223) >>> 0;
		return (s >>> 0) / 0xFFFFFFFF;
	  };
	}

    function generateSeed() {
    const status = document.getElementById("status");
    status.textContent = "Generating...";

    const seedInput =
        document.getElementById("optCustomSeed").value.trim();

    let restoreRandom = null;
	let seed = 0;

    if (seedInput) {
        const rng = seededRNG(seedInput);
		seed = seedInput;
        restoreRandom = Math.random;
        Math.random = rng;
    }
	else {
		const randomSeed = Math.floor(Math.random() * 10000000).toString();
		seed = randomSeed;
		const rng = seededRNG(randomSeed);
		restoreRandom = Math.random;
        Math.random = rng;
	}

    try {
	
		const seedLen = parseInt(document.getElementById("optLength").value, 10)
	
        let rando = window.randomizeOriginal(
            window.randomizerTable
        );
		
		while(
			rando._spheres.length == 0 
			|| (rando._maxSphere > 6 && seedLen == 1)
			|| (rando._maxSphere < 7 && rando._maxSphere > 10 && seedLen == 2)
			|| (rando._maxSphere < 11 && seedLen == 3)
			) {
			rando = window.randomizeOriginal(
				window.randomizerTable
			);
		}

        document.getElementById("spoilerLogOutput").textContent =
            rando._spoiler;

        document.getElementById("wayOfTheDragonOutput").textContent =
            rando._wayOfTheDragon.join("\n");
			
		window.lastGeneratedSeed = rando;
		window.seed = seed;

        status.textContent = "Generation complete. Seed = " + seed;
    } catch (e) {
        console.error(e);
        status.textContent = "Error: " + e.message;
    }

    if (restoreRandom) {
        Math.random = restoreRandom;
    }
}

    function toggleSpoiler() {
      const el = document.getElementById("spoilerLogContainer");
      el.style.display = (el.style.display === "none") ? "block" : "none";
    }

    function toggleWotD() {
      const el = document.getElementById("wayOfTheDragonContainer");
      el.style.display = (el.style.display === "none") ? "block" : "none";
    }

    window.generateSeed = generateSeed;
    window.toggleSpoiler = toggleSpoiler;
    window.toggleWotD = toggleWotD;
  </script>
  
  <script>
let loadedRomBytes = null;

document.getElementById("romUpload").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const arrayBuffer = await file.arrayBuffer();
  loadedRomBytes = new Uint8Array(arrayBuffer);

  document.getElementById("patchStatus").textContent =
    "ROM loaded (" + loadedRomBytes.length + " bytes)";
});

</script>
</body>
</html>
